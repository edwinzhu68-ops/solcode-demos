<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TecnoShop PA - Tienda Demo</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:#fafafa;color:#111}
.product-card{background:#fff;border-radius:16px;overflow:hidden;transition:all .3s;border:1px solid #eee}
.product-card:hover{box-shadow:0 10px 30px rgba(0,0,0,.08);transform:translateY(-4px)}
.product-card img{height:220px;width:100%;object-fit:contain;background:#f5f5f5;padding:20px;transition:transform .4s}
.product-card:hover img{transform:scale(1.05)}
.cat-pill{padding:8px 18px;border-radius:30px;font-size:13px;border:1px solid #ddd;background:#fff;cursor:pointer;transition:all .2s;color:#666}
.cat-pill.active,.cat-pill:hover{background:#111;color:#fff;border-color:#111}
.cart-badge{position:absolute;top:-6px;right:-6px;background:#e63946;color:#fff;font-size:10px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
#cart-panel{position:fixed;right:0;top:0;width:380px;height:100vh;background:#fff;box-shadow:-5px 0 30px rgba(0,0,0,.15);z-index:100;transform:translateX(100%);transition:transform .3s;overflow-y:auto}
#cart-panel.open{transform:translateX(0)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;display:none}
.overlay.open{display:block}
.stars{color:#f59e0b}
</style>
</head>
<body>

<!-- Nav -->
<nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-xl border-b">
  <div class="max-w-6xl mx-auto px-6 py-3 flex justify-between items-center">
    <div class="flex items-center gap-2">
      <span class="text-2xl font-bold">Tecno<span class="text-blue-600">Shop</span></span>
      <span class="text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full font-semibold">PA</span>
    </div>
    <div class="hidden md:flex items-center gap-1 bg-gray-100 rounded-full px-4 py-2 flex-1 max-w-md mx-8">
      <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input type="text" placeholder="Buscar productos..." class="bg-transparent outline-none text-sm flex-1 ml-2" id="search-input" oninput="filterProducts()">
    </div>
    <button onclick="toggleCart()" class="relative p-2">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/></svg>
      <span class="cart-badge" id="cart-count">0</span>
    </button>
  </div>
</nav>

<!-- Hero -->
<section class="bg-gradient-to-r from-blue-600 to-purple-600 text-white py-16 px-6">
  <div class="max-w-6xl mx-auto flex items-center justify-between">
    <div>
      <p class="text-blue-200 text-sm mb-2">Ofertas de Temporada</p>
      <h1 class="text-4xl font-bold mb-3">Hasta 40% OFF</h1>
      <p class="text-blue-100 mb-6">En toda la l&iacute;nea de electr&oacute;nica y accesorios</p>
      <a href="#products" class="inline-block px-6 py-3 bg-white text-blue-600 font-semibold rounded-full hover:bg-blue-50 transition">Comprar Ahora</a>
    </div>
    <div class="hidden md:block text-8xl">📱</div>
  </div>
</section>

<!-- Products -->
<section id="products" class="max-w-6xl mx-auto px-6 py-12">
  <div class="flex flex-wrap gap-2 mb-8" id="filters">
    <button class="cat-pill active" onclick="filterCat('all',this)">Todos</button>
    <button class="cat-pill" onclick="filterCat('phones',this)">Tel&eacute;fonos</button>
    <button class="cat-pill" onclick="filterCat('laptops',this)">Laptops</button>
    <button class="cat-pill" onclick="filterCat('audio',this)">Audio</button>
    <button class="cat-pill" onclick="filterCat('acc',this)">Accesorios</button>
  </div>
  <div class="grid grid-cols-2 md:grid-cols-4 gap-5" id="product-grid"></div>
</section>

<!-- Cart Panel -->
<div class="overlay" id="overlay" onclick="toggleCart()"></div>
<div id="cart-panel">
  <div class="p-6 border-b flex justify-between items-center">
    <h3 class="font-bold text-lg">Carrito</h3>
    <button onclick="toggleCart()" class="text-gray-400 hover:text-black">✕</button>
  </div>
  <div id="cart-items" class="p-6 space-y-4"></div>
  <div class="p-6 border-t bg-gray-50">
    <div class="flex justify-between mb-2"><span class="text-gray-500">Subtotal</span><span class="font-bold" id="cart-subtotal">$0.00</span></div>
    <div class="flex justify-between mb-4"><span class="text-gray-500">Env&iacute;o</span><span class="text-green-600 font-medium">Gratis</span></div>
    <div class="flex justify-between mb-4 text-lg"><span class="font-bold">Total</span><span class="font-bold text-blue-600" id="cart-total">$0.00</span></div>
    <button onclick="checkout()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-semibold hover:bg-blue-700 transition">Proceder al Pago</button>
    <button onclick="checkoutWA()" class="w-full py-3 mt-2 bg-green-500 text-white rounded-xl font-semibold hover:bg-green-600 transition">Pedir por WhatsApp</button>
  </div>
</div>

<!-- Footer -->
<footer class="bg-white border-t py-8 text-center text-gray-400 text-sm mt-12">
  <p>Demo creado por <span class="text-blue-600 font-semibold">SolCode</span> — Desarrollo con IA</p>
</footer>

<script>
const products=[
  {id:1,name:"iPhone 15 Pro",price:999,oldPrice:1199,cat:"phones",img:"https://images.unsplash.com/photo-1695048133142-1a20484d2569?w=400&q=80",rating:4.8,reviews:234},
  {id:2,name:"Samsung Galaxy S24",price:849,oldPrice:999,cat:"phones",img:"https://images.unsplash.com/photo-1610945415295-d9bbf067e59c?w=400&q=80",rating:4.7,reviews:189},
  {id:3,name:"MacBook Air M3",price:1299,oldPrice:1499,cat:"laptops",img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=400&q=80",rating:4.9,reviews:412},
  {id:4,name:"Dell XPS 15",price:1199,oldPrice:1399,cat:"laptops",img:"https://images.unsplash.com/photo-1593642702821-c8da6771f0c6?w=400&q=80",rating:4.6,reviews:156},
  {id:5,name:"AirPods Pro 2",price:249,oldPrice:299,cat:"audio",img:"https://images.unsplash.com/photo-1600294037681-c80b4cb5b434?w=400&q=80",rating:4.8,reviews:567},
  {id:6,name:"Sony WH-1000XM5",price:349,oldPrice:399,cat:"audio",img:"https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?w=400&q=80",rating:4.7,reviews:321},
  {id:7,name:"Cargador MagSafe",price:39,oldPrice:49,cat:"acc",img:"https://images.unsplash.com/photo-1628815113969-0487917e8b76?w=400&q=80",rating:4.5,reviews:89},
  {id:8,name:"Funda Premium",price:29,oldPrice:45,cat:"acc",img:"https://images.unsplash.com/photo-1601784551446-20c9e07cdbdb?w=400&q=80",rating:4.3,reviews:145},
  {id:9,name:"iPad Air",price:599,oldPrice:749,cat:"phones",img:"https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=400&q=80",rating:4.8,reviews:278},
  {id:10,name:"JBL Flip 6",price:129,oldPrice:149,cat:"audio",img:"https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=400&q=80",rating:4.6,reviews:203},
  {id:11,name:"Lenovo ThinkPad",price:899,oldPrice:1099,cat:"laptops",img:"https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?w=400&q=80",rating:4.5,reviews:167},
  {id:12,name:"Cable USB-C Premium",price:19,oldPrice:29,cat:"acc",img:"https://images.unsplash.com/photo-1583863788434-e58a36330cf0?w=400&q=80",rating:4.4,reviews:432},
];

let cart=[];
let currentFilter='all';

function renderProducts(filter='all',search=''){
  const grid=document.getElementById('product-grid');
  let items=filter==='all'?products:products.filter(p=>p.cat===filter);
  if(search)items=items.filter(p=>p.name.toLowerCase().includes(search.toLowerCase()));
  grid.innerHTML=items.map(p=>{
    const discount=Math.round((1-p.price/p.oldPrice)*100);
    return `<div class="product-card">
      <div class="relative">
        <img src="${p.img}" alt="${p.name}">
        <span class="absolute top-3 left-3 bg-red-500 text-white text-[11px] px-2 py-1 rounded-full font-semibold">-${discount}%</span>
      </div>
      <div class="p-4">
        <p class="text-xs text-gray-400 mb-1 stars">${'★'.repeat(Math.floor(p.rating))} <span class="text-gray-400">(${p.reviews})</span></p>
        <h4 class="font-semibold text-sm mb-2">${p.name}</h4>
        <div class="flex items-center gap-2 mb-3">
          <span class="font-bold text-lg">$${p.price}</span>
          <span class="text-gray-400 line-through text-sm">$${p.oldPrice}</span>
        </div>
        <button onclick="addToCart(${p.id})" class="w-full py-2.5 bg-blue-600 text-white rounded-xl text-sm font-semibold hover:bg-blue-700 transition">Agregar al Carrito</button>
      </div>
    </div>`}).join('');
}

function filterCat(cat,btn){
  currentFilter=cat;
  document.querySelectorAll('.cat-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts(cat,document.getElementById('search-input').value);
}

function filterProducts(){
  renderProducts(currentFilter,document.getElementById('search-input').value);
}

function addToCart(id){
  const p=products.find(x=>x.id===id);
  const existing=cart.find(x=>x.id===id);
  if(existing)existing.qty++;
  else cart.push({...p,qty:1});
  updateCart();
}

function removeFromCart(id){
  cart=cart.filter(x=>x.id!==id);
  updateCart();
}

function updateCart(){
  const count=cart.reduce((s,i)=>s+i.qty,0);
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById('cart-count').textContent=count;
  document.getElementById('cart-subtotal').textContent='$'+total.toFixed(2);
  document.getElementById('cart-total').textContent='$'+total.toFixed(2);
  document.getElementById('cart-items').innerHTML=cart.length?cart.map(i=>`
    <div class="flex gap-3 items-center">
      <img src="${i.img}" class="w-16 h-16 object-contain bg-gray-100 rounded-lg">
      <div class="flex-1">
        <p class="font-semibold text-sm">${i.name}</p>
        <p class="text-gray-500 text-xs">Cant: ${i.qty} × $${i.price}</p>
      </div>
      <div class="text-right">
        <p class="font-bold text-sm">$${(i.price*i.qty).toFixed(2)}</p>
        <button onclick="removeFromCart(${i.id})" class="text-red-400 text-xs hover:text-red-600">Eliminar</button>
      </div>
    </div>`).join(''):'<p class="text-gray-400 text-center">Carrito vac&iacute;o</p>';
}

function toggleCart(){
  document.getElementById('cart-panel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

function checkout(){alert('Redirigiendo a pasarela de pago...\n(Demo - no se procesar&aacute; ning&uacute;n pago)')}

function checkoutWA(){
  const msg=cart.map(i=>`${i.name} x${i.qty} = $${(i.price*i.qty).toFixed(2)}`).join('\n');
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0).toFixed(2);
  window.open(`https://wa.me/50768040864?text=${encodeURIComponent('Hola! Quiero comprar:\n'+msg+'\n\nTotal: $'+total)}`);
}

renderProducts();
</script>
</body>
</html>
